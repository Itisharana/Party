<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PartyPoper</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">

    <a class="navbar-brand" href="#">PartyPoper</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">

      <!-- SEARCH -->
      <form class="search-box mx-auto">
        <input type="text" placeholder="Search..." class="form-control">
        <span class="search-icon">🔍</span>
      </form>

      <!-- RIGHT -->
      <div class="d-flex align-items-center ms-auto gap-3">
        <a class="nav-link" href="#">Home</a>
        <a class="nav-link" href="#">Services</a>
        <a class="nav-link" href="#">Contact Us</a>

        <button class="btn"><u>Register</u></button>
        <button class="login-btn rounded-pill">Login</button>
      </div>

    </div>
  </div>
</nav>


<!-- HERO TEXT -->
<div class="container text-center hero-section mt-5">
    <h1 class="hero-title">
        Let’s Make <br>
        <span>Unforgettable Memories ✨</span>
    </h1>
    <p class="hero-subtitle">
        Host or join amazing parties near you.
    </p>
</div>


<!-- CARDS -->
<div class="container">
  <div class="row justify-content-center mt-4 gap-4">

    <!-- CARD 1 -->
    <div class="card col-md-5">
      <img src="./assets/hosting.webp" class="card-img" alt="Hosting Image">

      <div class="overlay-text">
        <p>Plan a party</p>
        <h4>Host Party</h4>
        <button class="card-button rounded-pill">Host</button>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card col-md-5">
      <img src="./assets/join.jpg" class="card-img" alt="Joining Image">

      <div class="overlay-text">
        <p>Discover party</p>
        <h4>Join Party</h4>
        <button class="card-button rounded-pill">Join</button>
      </div>
    </div>

  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
